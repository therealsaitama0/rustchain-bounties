name: RTC Auto-Pay on PR Merge

# FIX: this previously triggered on `pull_request: [closed]`, which does NOT
# receive repository secrets for PRs opened from forks (GitHub security). Almost
# every bounty claim is a fork PR, so RTC_VPS_HOST / RTC_ADMIN_KEY arrived blank
# and award_rtc exited 1 — silently failing every payout.
#
# `push: [main]` runs AFTER merge, in the trusted base-repo context, WITH secret
# access, on already-merged code. (Deliberately NOT pull_request_target, which
# would run untrusted PR head code with secrets — a known security footgun.)
on:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  auto-pay:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve merged PR from the pushed commit
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_json=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            -H "Accept: application/vnd.github+json" 2>/dev/null || echo '[]')
          number=$(echo "$pr_json" | jq -r '.[0].number // empty')
          author=$(echo "$pr_json" | jq -r '.[0].user.login // empty')
          echo "number=${number}" >> "$GITHUB_OUTPUT"
          echo "author=${author}" >> "$GITHUB_OUTPUT"
          if [ -z "$number" ]; then
            echo "No associated PR for this push — nothing to pay."
          else
            echo "Resolved PR #${number} by ${author}"
          fi

      - name: Set up Python
        if: steps.pr.outputs.number != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.pr.outputs.number != ''
        run: pip install requests

      - name: Run RTC Auto-Pay
        if: steps.pr.outputs.number != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
          PR_AUTHOR: ${{ steps.pr.outputs.author }}
          RTC_VPS_HOST: ${{ secrets.RTC_VPS_HOST }}
          RTC_ADMIN_KEY: ${{ secrets.RTC_ADMIN_KEY }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: python scripts/auto-pay.py
